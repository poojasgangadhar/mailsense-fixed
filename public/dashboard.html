<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Agentra MailSense – Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Font lock ── */
html{font-size:14px !important;-webkit-text-size-adjust:none !important;text-size-adjust:none !important;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* ── Themes ── */
:root,[data-theme="dark"]{
  --bg:#07090f;--surface:#0d1117;--surface2:#131a26;--surface3:#1a2235;
  --border:rgba(99,130,255,0.13);--border2:rgba(99,130,255,0.24);
  --accent:#4f6ef7;--accent2:#6b88ff;--teal:#2dd4bf;--teal2:#5eead4;
  --amber:#f59e0b;--red:#f87171;--green:#34d399;--purple:#a78bfa;
  --text:#e2e8f8;--text-muted:#7a85a8;--text-dim:#3a4260;
  --shadow:0 8px 32px rgba(0,0,0,0.45);
}
[data-theme="light"]{
  --bg:#f0f4ff;--surface:#fff;--surface2:#f5f7ff;--surface3:#eef1fb;
  --border:rgba(79,110,247,0.14);--border2:rgba(79,110,247,0.28);
  --accent:#4f6ef7;--accent2:#3d5ce0;--teal:#0d9488;--teal2:#14b8a6;
  --amber:#d97706;--red:#dc2626;--green:#059669;--purple:#7c3aed;
  --text:#1a2240;--text-muted:#5a6690;--text-dim:#9aa3c2;
  --shadow:0 4px 20px rgba(79,110,247,0.08);
}
html,body,#root{height:100%;min-height:100%;min-height:-webkit-fill-available;width:100%;max-width:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:background .3s,color .3s;overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
/* ── Layout ── */
.layout{display:flex;height:100svh;height:100vh;height:-webkit-fill-available;width:100%;overflow:hidden;}

.onboarding{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto;}
.onboarding-card{width:100%;max-width:600px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px;box-shadow:var(--shadow);animation:slideUp .5s cubic-bezier(.22,1,.36,1);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.ob-logo{display:flex;align-items:center;gap:12px;margin-bottom:24px;}
.ob-logo-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:#000;} .ob-logo-icon img{width:40px;height:40px;object-fit:contain;}
.ob-logo-icon svg{width:20px;height:20px;}
.ob-brand{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--text);}
.ob-sub{font-size:.65rem;font-weight:600;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;}
.onboarding h1{font-family:'DM Serif Display',serif;font-size:1.6rem;color:var(--text);margin-bottom:8px;line-height:1.2;}
.onboarding h1 em{font-style:italic;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ob-desc{font-size:.86rem;color:var(--text-muted);margin-bottom:24px;line-height:1.6;}
.mode-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
.mode-card{border:2px solid var(--border);border-radius:12px;padding:18px;cursor:pointer;transition:all .2s;background:var(--surface2);position:relative;}
.mode-card.sel-fast{border-color:var(--amber);background:rgba(245,158,11,.06);}
.mode-card.sel-safe{border-color:var(--teal);background:rgba(45,212,191,.06);}
.mc-check{position:absolute;top:10px;right:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.mode-card.sel-fast .mc-check{opacity:1;background:var(--amber);}
.mode-card.sel-safe .mc-check{opacity:1;background:var(--teal);}
.mc-icon{font-size:1.7rem;margin-bottom:10px;}
.mc-title{font-size:.94rem;font-weight:600;color:var(--text);margin-bottom:5px;}
.mc-desc{font-size:.78rem;color:var(--text-muted);line-height:1.5;}
.mc-features{margin-top:8px;display:flex;flex-direction:column;gap:4px;}
.mc-feat{font-size:.73rem;color:var(--text-muted);display:flex;align-items:flex-start;gap:5px;}
.mc-feat::before{content:'›';color:var(--teal);font-weight:700;flex-shrink:0;margin-top:1px;}
.ob-btn{width:100%;padding:13px;border:none;border-radius:9px;background:linear-gradient(135deg,var(--accent),#3d5ce0);color:white;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(79,110,247,.35);}
.ob-btn:hover{transform:translateY(-1px);}
.ob-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── Layout ── */
.layout{display:flex;height:100svh;height:100vh;height:-webkit-fill-available;width:100%;overflow:hidden;}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;backdrop-filter:blur(2px);}
.sb-overlay.active{display:block;}

/* ── Sidebar — Claude-style collapse ── */
.sidebar{
  width:220px;background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:50;flex-shrink:0;
  transition:width .28s cubic-bezier(.4,0,.2,1);overflow:hidden;
}
.sidebar.collapsed{width:52px;}
/* Labels/text: fade out when collapsed */
.sb-label{white-space:nowrap;overflow:hidden;opacity:1;max-width:140px;transition:opacity .2s,max-width .28s cubic-bezier(.4,0,.2,1);}
.sidebar.collapsed .sb-label{opacity:0;max-width:0;}
/* Section headers */
.sb-sec{font-size:.6rem;font-weight:600;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;padding:10px 14px 4px;white-space:nowrap;overflow:hidden;opacity:1;max-width:200px;transition:opacity .2s,max-width .28s;}
.sidebar.collapsed .sb-sec{opacity:0;max-width:0;padding:10px 0 4px;}
/* Logo */
.sb-logo{padding:0 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:52px;overflow:hidden;}
.logo-icon{width:26px;height:26px;min-width:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;background:#000;} .logo-icon img{width:26px;height:26px;object-fit:contain;}
.logo-icon svg{width:13px;height:13px;}
.logo-text{display:flex;flex-direction:column;line-height:1.1;overflow:hidden;}
.logo-brand{font-family:'DM Serif Display',serif;font-size:.92rem;color:var(--text);white-space:nowrap;}
.logo-sub{font-size:.56rem;font-weight:600;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;}
.sb-close-btn{display:none;margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:4px;flex-shrink:0;border-radius:6px;}
.sb-close-btn:hover{background:var(--surface2);}
/* Nav */
.sb-nav{flex:1;padding:6px 6px;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;gap:1px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:.8rem;font-weight:400;color:var(--text-muted);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;position:relative;min-height:36px;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:linear-gradient(135deg,rgba(79,110,247,.18),rgba(45,212,191,.08));color:var(--text);font-weight:500;}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:2.5px;background:linear-gradient(var(--accent),var(--teal));border-radius:2px;}
.nav-item svg,.nav-icon{width:16px;height:16px;flex-shrink:0;}
.nav-badge{margin-left:auto;flex-shrink:0;font-size:.6rem;font-weight:700;padding:1px 5px;border-radius:10px;background:var(--accent);color:white;opacity:1;transition:opacity .2s;}
.nav-badge.red{background:var(--red);}
.nav-badge.amber{background:var(--amber);}
.sidebar.collapsed .nav-badge{opacity:0;}
.notif-dot{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;opacity:1;transition:opacity .2s;animation:notifPulse 2s infinite;}
@keyframes notifPulse{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.4);}50%{box-shadow:0 0 0 4px rgba(248,113,113,0);}}
.sidebar.collapsed .notif-dot{opacity:0;}
/* Mode toggle */
.mode-tgl{margin:6px;padding:8px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.mode-tgl-label{font-size:.58rem;font-weight:600;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;white-space:nowrap;overflow:hidden;opacity:1;transition:opacity .2s;}
.sidebar.collapsed .mode-tgl-label{opacity:0;height:0;margin:0;}
.mode-btns{display:flex;gap:4px;}
.mbtn{flex:1;padding:6px 4px;border:none;border-radius:6px;font-family:inherit;font-size:.7rem;font-weight:500;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:3px;}
.mbtn.fast{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.mbtn.fast.active{background:var(--amber);color:#000;}
.mbtn.safe{background:rgba(45,212,191,.08);color:var(--teal);border:1px solid rgba(45,212,191,.18);}
.mbtn.safe.active{background:var(--teal);color:#000;}
.sidebar.collapsed .mode-btns{flex-direction:column;}
/* Bottom */
.sb-bottom{padding:6px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:3px;}
.sb-user{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:7px;overflow:hidden;}
.u-avatar{width:28px;height:28px;min-width:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--teal));display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;color:white;flex-shrink:0;}
.u-info{flex:1;min-width:0;overflow:hidden;}
.u-name{font-size:.76rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.u-role{font-size:.62rem;color:var(--text-muted);}
.logout-btn{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;font-size:.8rem;color:var(--red);cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;overflow:hidden;min-height:34px;}
.logout-btn:hover{background:rgba(248,113,113,.1);}
.logout-btn svg{width:15px;height:15px;flex-shrink:0;}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
/* Topbar */
.topbar{height:52px;min-height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;}
.collapse-btn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text-muted);cursor:pointer;padding:5px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;width:30px;height:30px;}
.collapse-btn:hover{background:var(--surface2);color:var(--accent);border-color:var(--accent);}
.hamburger{display:none;background:none;border:none;color:var(--text-muted);cursor:pointer;padding:5px;border-radius:7px;flex-shrink:0;}
.topbar-title{font-family:'DM Serif Display',serif;font-size:.96rem;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-title span{font-style:italic;background:linear-gradient(90deg,var(--accent2),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.status-pill{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:.68rem;font-weight:500;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green);white-space:nowrap;flex-shrink:0;}
.status-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.mode-pill{display:flex;align-items:center;gap:4px;padding:4px 9px;border-radius:20px;font-size:.68rem;font-weight:600;white-space:nowrap;flex-shrink:0;}
.mode-pill.fast{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);color:var(--amber);}
.mode-pill.safe{background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.25);color:var(--teal);}
.theme-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text-muted);cursor:pointer;transition:all .2s;flex-shrink:0;font-family:inherit;font-size:.7rem;font-weight:500;}
.theme-btn:hover{border-color:var(--accent);color:var(--accent);}
.theme-btn svg{width:13px;height:13px;flex-shrink:0;}

/* ── Content ── */
.content{flex:1;overflow-y:auto;padding:12px 14px;}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:14px;position:relative;overflow:hidden;transition:border-color .2s,transform .2s;}
.stat-card:hover{border-color:var(--border2);transform:translateY(-1px);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.blue::before{background:linear-gradient(90deg,var(--accent),var(--accent2));}
.stat-card.teal::before{background:linear-gradient(90deg,var(--teal),var(--teal2));}
.stat-card.amber::before{background:var(--amber);}
.stat-card.red::before{background:var(--red);}
.stat-card.green::before{background:var(--green);}
.stat-label{font-size:.66rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stat-value{font-family:'DM Serif Display',serif;font-size:1.7rem;color:var(--text);line-height:1;}
.stat-sub{font-size:.66rem;color:var(--text-muted);margin-top:4px;}
.stat-icon{position:absolute;right:12px;top:12px;opacity:.07;}
.stat-icon svg{width:34px;height:34px;}

/* Panels */
.two-col{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:10px;}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:10px;}
.panel-header{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.panel-title{font-size:.8rem;font-weight:600;color:var(--text);flex:1;}
.panel-badge{font-size:.63rem;font-weight:500;padding:2px 7px;border-radius:9px;background:var(--surface2);color:var(--text-muted);border:1px solid var(--border);}

/* Mode banner */
.mode-banner{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:9px;margin-bottom:12px;font-size:.8rem;}
.mode-banner.fast{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--amber);}
.mode-banner.safe{background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.18);color:var(--teal);}
.mode-banner strong{font-weight:600;}
.mode-banner p{color:var(--text-muted);font-size:.74rem;margin-top:2px;}

/* Action buttons */
.action-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap;}
.action-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:.76rem;font-weight:500;cursor:pointer;transition:all .15s;min-height:34px;white-space:nowrap;}
.action-btn:hover{background:var(--surface3);border-color:var(--accent);color:var(--accent2);}
.action-btn svg{width:13px;height:13px;flex-shrink:0;}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),#3d5ce0);border:none;color:white;box-shadow:0 3px 12px rgba(79,110,247,.3);}
.action-btn.primary:hover{box-shadow:0 4px 18px rgba(79,110,247,.5);color:white;}
.action-btn.danger{border-color:rgba(248,113,113,.3);color:var(--red);}
.action-btn.danger:hover{background:rgba(248,113,113,.1);border-color:var(--red);}
.action-btn.teal{border-color:rgba(45,212,191,.3);color:var(--teal);}
.action-btn.teal:hover{background:rgba(45,212,191,.08);}
.action-btn.amber{border-color:rgba(245,158,11,.3);color:var(--amber);}
.action-btn.amber:hover{background:rgba(245,158,11,.08);}
.action-btn:disabled{opacity:.45;cursor:not-allowed;}

/* Date range picker */
.date-range-bar{display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;margin-bottom:10px;flex-wrap:wrap;}
.dr-label{font-size:.72rem;font-weight:600;color:var(--text-muted);white-space:nowrap;}
.dr-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text-muted);font-family:inherit;font-size:.72rem;cursor:pointer;transition:all .15s;white-space:nowrap;}
.dr-btn:hover{border-color:var(--accent);color:var(--accent);}
.dr-btn.active{background:var(--accent);border-color:var(--accent);color:white;font-weight:600;}
.dr-sep{width:1px;height:16px;background:var(--border2);flex-shrink:0;}
.dr-custom{display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.dr-date-input{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.72rem;cursor:pointer;outline:none;}
.dr-date-input:focus{border-color:var(--accent);}

/* Emails */
.email-list{max-height:340px;overflow-y:auto;}
.email-item{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.email-item:last-child{border-bottom:none;}
.email-item:hover{background:var(--surface2);}
.email-item input[type=checkbox]{margin-top:2px;flex-shrink:0;accent-color:var(--accent);width:13px;height:13px;}
.e-avatar{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;flex-shrink:0;color:white;}
.e-body{flex:1;min-width:0;}
.e-from{font-size:.76rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.e-subject{font-size:.7rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.e-time{font-size:.63rem;color:var(--text-dim);flex-shrink:0;margin-top:2px;}
.e-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:3px;}
.e-tag{font-size:.58rem;font-weight:600;padding:1px 5px;border-radius:5px;text-transform:uppercase;letter-spacing:.03em;}
.tag-important{background:rgba(79,110,247,.15);color:var(--accent2);border:1px solid rgba(79,110,247,.22);}
.tag-spam{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.2);}
.tag-promo{background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.tag-replied{background:rgba(52,211,153,.1);color:var(--green);border:1px solid rgba(52,211,153,.18);}
.tag-draft{background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.2);}
.del-toolbar{padding:9px 14px;background:rgba(248,113,113,.06);border-bottom:1px solid rgba(248,113,113,.14);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.del-toolbar span{font-size:.74rem;color:var(--text-muted);flex:1;}
.btn-del{padding:5px 11px;border-radius:6px;border:none;background:var(--red);color:white;font-family:inherit;font-size:.73rem;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:4px;}
.sel-drop{padding:5px 7px;border-radius:6px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:inherit;font-size:.73rem;cursor:pointer;outline:none;}

/* Logs */
.log-list{max-height:260px;overflow-y:auto;padding:4px 0;}
.log-item{display:flex;align-items:flex-start;gap:9px;padding:6px 14px;font-size:.72rem;border-bottom:1px solid rgba(99,130,255,.04);}
.log-item:last-child{border-bottom:none;}
.log-time{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--text-dim);flex-shrink:0;margin-top:1px;min-width:40px;}
.log-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.log-dot.green{background:var(--green);}
.log-dot.red{background:var(--red);}
.log-dot.amber{background:var(--amber);}
.log-dot.blue{background:var(--accent2);}
.log-text{color:var(--text-muted);flex:1;line-height:1.4;}
.log-text strong{color:var(--text);font-weight:500;}

/* Agent grid */
.agent-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px 14px;}
.agent-card{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:11px;}
.ac-title{font-size:.63rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.ac-val{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--text);}
.ac-sub{font-size:.63rem;color:var(--text-dim);margin-top:2px;}

/* Gmail */
.gmail-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;margin-bottom:12px;}
.gmail-icon{width:52px;height:52px;margin:0 auto 14px;background:rgba(234,67,53,.1);border:1px solid rgba(234,67,53,.2);border-radius:12px;display:flex;align-items:center;justify-content:center;}
.gmail-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:7px;}
.gmail-desc{font-size:.78rem;color:var(--text-muted);line-height:1.6;margin-bottom:18px;max-width:340px;margin-left:auto;margin-right:auto;}
.gmail-btn{display:inline-flex;align-items:center;gap:9px;padding:11px 22px;border-radius:9px;border:1.5px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:.84rem;font-weight:500;cursor:pointer;transition:all .2s;}
.gmail-btn:hover{border-color:var(--accent);background:var(--surface3);}
.gmail-connected{display:flex;align-items:center;gap:9px;padding:13px 16px;background:rgba(52,211,153,.06);border:1px solid rgba(52,211,153,.2);border-radius:9px;margin-bottom:12px;}
.gcc-text{flex:1;}
.gcc-title{font-size:.82rem;font-weight:500;color:var(--text);}
.gcc-sub{font-size:.7rem;color:var(--text-muted);margin-top:2px;}
.disconnect-btn{padding:6px 11px;border-radius:6px;border:1px solid rgba(248,113,113,.3);background:none;color:var(--red);font-family:inherit;font-size:.73rem;cursor:pointer;}

/* Settings */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);margin-bottom:7px;flex-wrap:wrap;gap:8px;}
.sr-label{font-size:.8rem;color:var(--text);font-weight:500;}
.sr-sub{font-size:.7rem;color:var(--text-muted);margin-top:2px;}
.toggle-switch{position:relative;width:38px;height:21px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:21px;cursor:pointer;transition:.28s;}
.toggle-slider::before{content:'';position:absolute;width:15px;height:15px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.28s;}
.toggle-switch input:checked + .toggle-slider{background:var(--teal);}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(17px);}
.danger-zone{background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.2);border-radius:11px;padding:16px;}
.dz-title{font-size:.8rem;font-weight:600;color:var(--red);margin-bottom:5px;}
.dz-desc{font-size:.74rem;color:var(--text-muted);margin-bottom:12px;line-height:1.5;}
.del-acc-btn{padding:9px 18px;border-radius:8px;border:1.5px solid var(--red);background:none;color:var(--red);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:7px;}
.del-acc-btn:hover{background:var(--red);color:white;}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(5px);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:100%;animation:slideUp .28s ease;max-height:90dvh;overflow-y:auto;}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:8px;}
.modal-desc{font-size:.79rem;color:var(--text-muted);line-height:1.6;margin-bottom:16px;}
.modal-actions{display:flex;gap:8px;margin-top:14px;}
.modal-cancel{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:inherit;font-size:.8rem;cursor:pointer;}
.modal-confirm{flex:1;padding:9px;border-radius:8px;border:none;background:var(--red);color:white;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;}
.modal-confirm.teal{background:var(--teal);color:#000;}
.modal-confirm.accent{background:var(--accent);color:white;}
.modal-input{width:100%;padding:9px 11px;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:.84rem;outline:none;margin-bottom:8px;transition:border-color .2s;}
.modal-input:focus{border-color:var(--accent);}
.modal-label{font-size:.7rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;display:block;}
.modal-error{font-size:.74rem;color:var(--red);margin-top:-4px;margin-bottom:8px;min-height:16px;}

/* Reply modal */
.reply-meta{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;padding:9px 11px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);}
.reply-meta-row{display:flex;gap:7px;font-size:.73rem;}
.reply-meta-lbl{color:var(--text-dim);min-width:56px;font-weight:600;}
.reply-meta-val{color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.context-input{width:100%;padding:7px 9px;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:inherit;font-size:.78rem;resize:vertical;min-height:52px;outline:none;transition:border-color .2s;margin-bottom:7px;}
.context-input:focus{border-color:var(--accent);}
.reply-box{background:var(--surface2);border:1px solid var(--border);border-radius:9px;overflow:hidden;margin:8px 0;}
.reply-box-header{font-size:.68rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;padding:7px 11px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.reply-box-body{padding:10px 11px;font-size:.8rem;color:var(--text);line-height:1.6;}
.reply-textarea{width:100%;padding:9px 11px;background:transparent;border:none;outline:none;resize:vertical;min-height:110px;font-family:inherit;font-size:.8rem;color:var(--text);line-height:1.6;}

/* Analyzer */
.analyzer-item{border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.analyzer-hdr{display:flex;align-items:center;gap:9px;padding:10px 13px;background:var(--surface2);cursor:pointer;transition:background .12s;}
.analyzer-hdr:hover{background:var(--surface3);}
.analyzer-body{padding:12px 13px;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;}
.abadge{font-size:.63rem;font-weight:600;padding:2px 7px;border-radius:9px;margin-left:auto;flex-shrink:0;}
.abadge.sent{background:rgba(52,211,153,.14);color:var(--green);border:1px solid rgba(52,211,153,.22);}
.abadge.pending{background:rgba(245,158,11,.14);color:var(--amber);border:1px solid rgba(245,158,11,.22);}

/* Misc */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface3);border:1px solid var(--border2);border-radius:9px;padding:10px 14px;font-size:.77rem;color:var(--text);box-shadow:var(--shadow);z-index:1000;animation:toastIn .28s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;gap:9px;max-width:300px;}
@keyframes toastIn{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spinA .7s linear infinite;flex-shrink:0;}
@keyframes spinA{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:36px 16px;color:var(--text-dim);font-size:.78rem;}
.notifs-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.64rem;font-weight:600;background:rgba(245,158,11,.14);border:1px solid rgba(245,158,11,.28);color:var(--amber);animation:notifPulse 2s infinite;}

/* Lock font globally */
html{
  font-size:14px !important;
  -webkit-text-size-adjust:100% !important;
  -moz-text-size-adjust:100% !important;
  text-size-adjust:100% !important;
}
input,textarea,select,button{font-size:14px !important;}

/* ── Large tablets: 900–1199px ── */
@media(max-width:1199px){
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
}

/* ── Tablets: 641–899px ── */
@media(max-width:899px){
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px;}
  .two-col{grid-template-columns:1fr;}
  .agent-grid{grid-template-columns:repeat(2,1fr);}
  .settings-row{flex-wrap:wrap;}
  .settings-row .sel-drop{width:100%;}
  .action-row{flex-wrap:wrap;}
  .content{padding:10px 12px;}
}

/* ── Desktop sidebar collapse ── */
@media(min-width:641px){
  .sidebar.collapsed .sb-label,
  .sidebar.collapsed .sb-sec,
  .sidebar.collapsed .mode-tgl-label,
  .sidebar.collapsed .u-info{opacity:0;max-width:0;}
  .sidebar.collapsed .nav-badge,
  .sidebar.collapsed .notif-dot{opacity:0;}
}

/* ── Mobile: ≤640px ── */
@media(max-width:640px){
  /* Full height fix for mobile browsers */
  .layout{height:100svh;height:100vh;height:-webkit-fill-available;overflow:hidden;}

  /* Sidebar becomes a slide-in drawer */
  .sidebar{
    position:fixed !important;
    left:0;top:0;bottom:0;
    width:260px !important;
    z-index:60;
    transform:translateX(-100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    box-shadow:4px 0 32px rgba(0,0,0,.6);
    overflow-y:auto;
    overflow-x:hidden;
  }
  .sidebar.mobile-open{transform:translateX(0) !important;}
  .sidebar.collapsed{transform:translateX(-100%) !important;}
  .sidebar.mobile-open.collapsed{transform:translateX(0) !important;}

  /* Show all labels when drawer open */
  .sidebar.mobile-open .sb-label,
  .sidebar.mobile-open .sb-sec,
  .sidebar.mobile-open .mode-tgl-label,
  .sidebar.mobile-open .nav-badge,
  .sidebar.mobile-open .notif-dot,
  .sidebar.mobile-open .u-info{opacity:1 !important;max-width:none !important;}

  /* Buttons */
  .sb-close-btn{display:flex !important;align-items:center;justify-content:center;}
  .collapse-btn{display:none !important;}
  .hamburger{display:flex !important;}

  /* Topbar */
  .topbar{padding:0 8px;gap:6px;height:48px;min-height:48px;}
  .topbar-title{font-size:0.85rem !important;}
  .status-pill,.mode-pill,.theme-lbl{display:none !important;}

  /* Scrollable content area */
  .main{overflow:hidden;display:flex;flex-direction:column;}
  .content{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    padding:8px;
    -webkit-overflow-scrolling:touch;
  }

  /* Stats — 2 columns */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:10px;}
  .stat-card{padding:10px 12px;}
  .stat-value{font-size:1.35rem !important;}
  .stat-label{font-size:0.6rem;}

  /* All single column */
  .two-col{grid-template-columns:1fr !important;}
  .agent-grid{grid-template-columns:repeat(2,1fr);gap:7px;}
  .mode-cards{grid-template-columns:1fr !important;}

  /* Panels */
  .panel{border-radius:9px;margin-bottom:8px;}
  .panel-header{flex-wrap:wrap;gap:6px;padding:9px 12px;}

  /* Onboarding */
  .onboarding{padding:12px;}
  .onboarding-card{padding:20px 16px;border-radius:14px;max-width:100%;}

  /* Actions */
  .action-row{gap:5px;flex-wrap:wrap;}
  .action-btn{
    padding:7px 10px !important;
    font-size:0.72rem !important;
    min-height:34px;
    white-space:nowrap;
  }

  /* Email list */
  .email-list{max-height:none;}
  .email-item{padding:9px 12px;gap:8px;}
  .e-from{font-size:0.74rem;}
  .e-subject{font-size:0.68rem;}

  /* Delete toolbar */
  .del-toolbar{flex-wrap:wrap;gap:6px;padding:8px 12px;}

  /* Settings */
  .settings-row{flex-direction:column;align-items:flex-start;gap:7px;padding:10px 12px;}
  .settings-row .sel-drop{width:100%;}
  .danger-zone{padding:13px;}

  /* Modals — bottom sheet style */
  .modal-overlay{align-items:flex-end !important;padding:0 !important;}
  .modal{
    border-radius:18px 18px 0 0 !important;
    padding:20px 16px 36px !important;
    width:100% !important;
    max-width:100% !important;
    max-height:88svh !important;
    max-height:88vh !important;
  }
  .modal-actions{flex-direction:column;}
  .modal-cancel,.modal-confirm{padding:13px !important;font-size:0.84rem !important;}
  .modal-input{font-size:16px !important;} /* prevent iOS zoom */

  /* Toast */
  .toast{
    bottom:0 !important;right:0 !important;left:0 !important;
    max-width:100% !important;
    border-radius:12px 12px 0 0 !important;
    border-left:none;border-right:none;border-bottom:none;
  }
}

/* ── Small phones: ≤380px ── */
@media(max-width:380px){
  .stats-grid{grid-template-columns:1fr 1fr;gap:6px;}
  .stat-card{padding:9px 10px;}

  .email-item{padding:8px 10px;}

  .nav-item{padding:7px 8px;font-size:0.76rem;}
}

/* ── Galaxy Fold / very tiny: ≤320px ── */
@media(max-width:320px){
  .stats-grid{grid-template-columns:1fr;gap:6px;}
  .agent-grid{grid-template-columns:1fr;}
  .stat-value{font-size:1.1rem !important;}
  .content{padding:5px;}
}

/* ── Date Range Bar ── */
function DateRangeBar({value, onChange}){
  const [showCustom,setShowCustom]=useState(value.startsWith('custom'));
  const [from,setFrom]=useState('');
  const [to,setTo]=useState('');
  const ranges=[{v:'yesterday',l:'Yesterday'},{v:'7days',l:'Last 7 days'},{v:'30days',l:'Last 30 days'},{v:'1year',l:'Last 1 year'},{v:'all',l:'All'}];
  const applyCustom=()=>{
    if(from&&to) onChange(`custom:${from.replace(/-/g,'/')}:${to.replace(/-/g,'/')}`);
  };
  return(<div className="date-range-bar">
    <span className="dr-label">{I.cal} Fetch range:</span>
    {ranges.map(r=>(
      <button key={r.v} className={`dr-btn ${value===r.v?'active':''}`} onClick={()=>{setShowCustom(false);onChange(r.v);}}>{r.l}</button>
    ))}
    <div className="dr-sep"/>
    <button className={`dr-btn ${showCustom?'active':''}`} onClick={()=>setShowCustom(x=>!x)}>Custom</button>
    {showCustom&&<div className="dr-custom">
      <input type="date" className="dr-date-input" value={from} onChange={e=>setFrom(e.target.value)}/>
      <span style={{fontSize:'.72rem',color:'var(--text-dim)'}}>to</span>
      <input type="date" className="dr-date-input" value={to} onChange={e=>setTo(e.target.value)}/>
      <button className="dr-btn active" onClick={applyCustom}>Apply</button>
    </div>}
  </div>);
}

/* ── Safe Mode: Reply Confirm Modal (clean, no big eye) ── */
function ReplyModal({email, userEmail, replyTemplate, onClose, onSend}){
  const [loading,setLoading]=useState(false);
  const [generating,setGenerating]=useState(true);
  const [reply,setReply]=useState('');
  const [context,setContext]=useState('');
  const [err,setErr]=useState('');

  useEffect(()=>{gen();},[]);

  const gen=async()=>{
    setGenerating(true);setErr('');
    try{
      const res=await fetch('/api/gmail-generate-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId:email.id,replyTemplate,customContext:context||undefined})});
      const d=await res.json();
      if(d.success)setReply(d.reply);
      else setErr(d.error||'Generation failed');
    }catch{setErr('Network error. Make sure Mistral API key is set.');}
    setGenerating(false);
  };

  const handleSend=async()=>{
    setLoading(true);
    await onSend(email.id,reply);
    setLoading(false);onClose();
  };

  return(<div className="modal-overlay"><div className="modal" style={{maxWidth:500}}>
    <div className="modal-title">🛡️ Review Reply Before Sending</div>
    <div className="reply-meta">
      <div className="reply-meta-row"><span className="reply-meta-lbl">To:</span><span className="reply-meta-val">{email.from}</span></div>
      <div className="reply-meta-row"><span className="reply-meta-lbl">Subject:</span><span className="reply-meta-val">{email.subject}</span></div>
    </div>
    <label className="modal-label" style={{marginBottom:4}}>Add context for AI <span style={{color:'var(--text-dim)',fontWeight:400,textTransform:'none',letterSpacing:0}}>(optional)</span></label>
    <textarea className="context-input" value={context} onChange={e=>setContext(e.target.value)} placeholder="e.g. Tell them I'll respond by Friday…" rows={2}/>
    <button className="action-btn" style={{width:'100%',justifyContent:'center',marginBottom:8}} onClick={gen} disabled={generating}>
      {generating?<><span className="spin"/> Generating with Mistral AI…</>:<>{I.refresh} Re-generate Reply</>}
    </button>
    {err&&<div style={{color:'var(--red)',fontSize:'.74rem',marginBottom:8,padding:'6px 9px',background:'rgba(248,113,113,.08)',borderRadius:6,border:'1px solid rgba(248,113,113,.2)'}}>{err}</div>}
    <div className="reply-box">
      <div className="reply-box-header">
        <span>AI Generated Reply</span>
        <span style={{fontSize:'.66rem',color:'var(--text-dim)',fontWeight:400}}>Edit before sending</span>
      </div>
      {generating
        ?<div className="reply-box-body" style={{color:'var(--text-dim)',textAlign:'center',padding:'20px 0'}}>Generating reply…</div>
        :<textarea className="reply-textarea" value={reply} onChange={e=>setReply(e.target.value)}/>
      }
    </div>
    <div className="modal-actions">
      <button className="modal-cancel" onClick={onClose}>Cancel</button>
      <button className="modal-confirm teal" onClick={handleSend} disabled={loading||generating||!reply}>
        {loading?<><span className="spin" style={{borderTopColor:'#000'}}/> Sending…</>:<>{I.send} Send Reply</>}
      </button>
    </div>
  </div></div>);
}

/* ── Fast Mode Analyzer (clean expandable cards) ── */
function FastAnalyzer({emails,userEmail,replyTemplate,t}){
  const [expanded,setExpanded]=useState(null);
  const [previews,setPreviews]=useState({});
  const [loading,setLoading]=useState({});

  const load=async(em)=>{
    if(expanded===em.id){setExpanded(null);return;}
    if(previews[em.id]){setExpanded(em.id);return;}
    setLoading(l=>({...l,[em.id]:true}));
    try{
      const res=await fetch('/api/gmail-generate-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId:em.id,replyTemplate})});
      const d=await res.json();
      if(d.success)setPreviews(p=>({...p,[em.id]:d.reply}));
      else setPreviews(p=>({...p,[em.id]:'Could not generate preview: '+d.error}));
    }catch{setPreviews(p=>({...p,[em.id]:'Network error generating preview.'}));}
    setLoading(l=>({...l,[em.id]:false}));
    setExpanded(em.id);
  };

  const importantEmails=emails.filter(e=>e.tag==='important'&&!e.deleted);
  return(<div className="panel">
    <div className="panel-header">
      <div className="panel-title">⚡ Auto-Reply Analyzer</div>
      <span className="panel-badge">{importantEmails.filter(e=>e.replied).length}/{importantEmails.length} handled</span>
    </div>
    <div style={{padding:'10px 12px'}}>
      <div style={{fontSize:'.75rem',color:'var(--amber)',marginBottom:10,padding:'7px 11px',background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.18)',borderRadius:7}}>
        ⚡ Fast Mode: AI replies are sent automatically. Click any email to preview the reply.
      </div>
      {importantEmails.length===0&&<div className="empty">No important emails yet.</div>}
      {importantEmails.map(em=>(
        <div key={em.id} className="analyzer-item">
          <div className="analyzer-hdr" onClick={()=>load(em)}>
            <div className="e-avatar" style={{background:em.color||'#4f6ef7',width:26,height:26,minWidth:26,fontSize:'.63rem'}}>{(em.from||'?')[0].toUpperCase()}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'.76rem',fontWeight:500,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{em.from}</div>
              <div style={{fontSize:'.68rem',color:'var(--text-muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{em.subject}</div>
            </div>
            <span className={`abadge ${em.replied?'sent':'pending'}`}>{em.replied?'Sent':'Pending'}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginLeft:4,color:'var(--text-dim)',flexShrink:0,transform:expanded===em.id?'rotate(180deg)':'none',transition:'transform .2s'}}><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          {expanded===em.id&&<div className="analyzer-body">
            {loading[em.id]?'Generating preview…':previews[em.id]||'Click to load'}
          </div>}
        </div>
      ))}
    </div>
  </div>);
}

/* ── Email Detail Modal ── */
function EmailDetailModal({email, mode, userEmail, onClose, onReply, onDelete}){
  const [delConfirm,setDelConfirm]=useState(false);
  const [deleting,setDeleting]=useState(false);

  const handleDelete=async()=>{
    setDeleting(true);
    await onDelete([email.id]);
    setDeleting(false);
    onClose();
  };

  if(!email)return null;
  return(<div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div className="modal" style={{maxWidth:580,width:'100%'}}>
      {/* Header */}
      <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:14}}>
        <div className="e-avatar" style={{background:email.color||'#4f6ef7',width:36,height:36,minWidth:36,fontSize:'.8rem'}}>{(email.from||'?')[0].toUpperCase()}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:'.88rem',fontWeight:600,color:'var(--text)',marginBottom:3}}>{email.subject||'(no subject)'}</div>
          <div style={{fontSize:'.74rem',color:'var(--text-muted)'}}>From: <strong style={{color:'var(--text)'}}>{email.from}</strong></div>
          <div style={{fontSize:'.7rem',color:'var(--text-dim)',marginTop:2}}>{email.time}</div>
        </div>
        <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',padding:4,borderRadius:6,flexShrink:0}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      {/* Tags */}
      <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
        <span className={`e-tag tag-${email.tag}`}>{email.tag}</span>
        {email.replied&&<span className="e-tag tag-replied">✓ replied</span>}
        {!email.replied&&email.tag==='important'&&<span className="e-tag tag-draft">not replied</span>}
      </div>

      {/* Body */}
      <div style={{background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:9,padding:'12px 14px',marginBottom:14,maxHeight:280,overflowY:'auto'}}>
        {email.body && email.body.trim()
          ? <div style={{fontSize:'.8rem',color:'var(--text)',lineHeight:1.7,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{email.body}</div>
          : <div style={{fontSize:'.8rem',color:'var(--text-muted)',lineHeight:1.7}}>{email.snippet||'(no content available)'}</div>
        }
      </div>

      {/* Actions */}
      {!delConfirm?(
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {!email.replied&&email.tag==='important'&&mode==='safe'&&(
            <button className="action-btn teal" onClick={()=>{onClose();onReply(email);}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Review & Reply
            </button>
          )}
          <button className="action-btn danger" onClick={()=>setDelConfirm(true)}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg> Move to Bin
          </button>
          <button className="action-btn" onClick={onClose} style={{marginLeft:'auto'}}>Close</button>
        </div>
      ):(
        <div style={{background:'rgba(248,113,113,.06)',border:'1px solid rgba(248,113,113,.2)',borderRadius:8,padding:'12px 14px'}}>
          <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--red)',marginBottom:4}}>Move to Bin?</div>
          <div style={{fontSize:'.74rem',color:'var(--text-muted)',marginBottom:10}}>This will move the email to Bin in this dashboard <strong>and in your real Gmail inbox</strong>.</div>
          <div style={{display:'flex',gap:7}}>
            <button className="action-btn" onClick={()=>setDelConfirm(false)}>Cancel</button>
            <button className="action-btn danger" onClick={handleDelete} disabled={deleting}>
              {deleting?<><span className="spin"/> Moving…</>:'Yes, Move to Bin'}
            </button>
          </div>
        </div>
      )}
    </div>
  </div>);
}

/* ════════════════════════════════════════════════════════════ */
function App(){
  const userEmail=sessionStorage.getItem('user_email')||'';
  const userName=sessionStorage.getItem('user_name')||'User';

  const [showOB,setShowOB]=useState(localStorage.getItem('ms_onboarded')!=='true');
  const [nav,setNav]=useState('dashboard');
  const [mode,setMode]=useState(localStorage.getItem('ms_mode')||'safe');
  const [emails,setEmails]=useState([]);
  const [logs,setLogs]=useState([]);
  const [stats,setStats]=useState({total:0,important:0,promo:0,spam:0,replied:0});
  const [selected,setSelected]=useState([]);
  const [delCat,setDelCat]=useState('');
  const [toast,setToast]=useState(null);
  const [sbOpen,setSbOpen]=useState(false);
  const [collapsed,setCollapsed]=useState(false);
  const [theme,setTheme]=useState(()=>localStorage.getItem('ms_theme')||'dark');
  const [gmailConn,setGmailConn]=useState(false);
  const [notifs,setNotifs]=useState(NOTIFS);
  const [loading,setLoading]=useState(false);
  const [fetching,setFetching]=useState(false);
  const [dateRange,setDateRange]=useState('7days');
  const [replyTemplate,setReplyTemplate]=useState('Hi,\n\nThank you for your email. I have received your message and will get back to you as soon as possible.\n\nBest regards');
  const [autoDelete,setAutoDelete]=useState(()=>{try{return JSON.parse(localStorage.getItem('ms_autodelete'))||{spam:'7',promo:'30',bin:'30'};}catch{return{spam:'7',promo:'30',bin:'30'};}});
  const [replyModal,setReplyModal]=useState(null);
  const [openEmail,setOpenEmail]=useState(null); // email detail view
  const [showLogoutModal,setShowLogoutModal]=useState(false);
  const [showDelModal,setShowDelModal]=useState(false);
  const [delEmail,setDelEmail]=useState('');
  const [delPw,setDelPw]=useState('');
  const [delErr,setDelErr]=useState('');
  const [delLoading,setDelLoading]=useState(false);
  const [showBulkDelModal,setShowBulkDelModal]=useState(false);
  const [bulkDelCats,setBulkDelCats]=useState({inbox:false,important:false,promotions:false,spam:false,bin:false});
  const [bulkDeleting,setBulkDeleting]=useState(false);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('ms_theme',theme);},[theme]);
  useEffect(()=>{
    if(!showOB&&userEmail)loadStatus();
    const p=new URLSearchParams(window.location.search);
    if(p.get('gmail')==='connected'){setGmailConn(true);addLog('green','Gmail connected!');t('Gmail connected! Fetching emails…','green');window.history.replaceState({},'',window.location.pathname);setTimeout(()=>fetchEmails(),1200);}
    else if(p.get('gmail')==='error'){t(`Gmail error: ${p.get('reason')||'unknown'}`,'red');window.history.replaceState({},'',window.location.pathname);}
  },[showOB]);

  const loadStatus=async()=>{
    try{const res=await fetch('/api/gmail-status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail})});const d=await res.json();if(d.connected){setGmailConn(true);if(d.emails)setEmails(d.emails);if(d.stats)setStats(d.stats);if(d.logs)setLogs(d.logs);}}catch{}
  };

  const addLog=(dot,text)=>{const time=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false});setLogs(l=>[{id:Date.now(),time,dot,text},...l].slice(0,80));};
  const t=(msg,type='green')=>setToast({msg,type});

  const filteredEmails=(filter)=>{
    if(filter==='inbox')return emails.filter(e=>!e.archived&&!e.deleted);
    if(filter==='important')return emails.filter(e=>e.tag==='important'&&!e.archived&&!e.deleted);
    if(filter==='promotions')return emails.filter(e=>e.tag==='promo'&&!e.archived&&!e.deleted);
    if(filter==='spam')return emails.filter(e=>e.tag==='spam'&&!e.deleted);
    if(filter==='bin')return emails.filter(e=>e.deleted);
    return emails;
  };

  const fetchEmails=async()=>{
    if(!gmailConn)return t('Please connect Gmail first','red');
    setFetching(true);addLog('blue',`Fetching emails (${dateRange})…`);
    try{
      const res=await fetch('/api/gmail-fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,maxEmails:500,dateRange})});
      const d=await res.json();
      if(d.success){
        // Use fresh data directly from response — no stale state
        if(d.emails)setEmails(d.emails);
        if(d.stats)setStats(d.stats);
        addLog('green',`Fetched <strong>${d.fetched}</strong> emails`);
        t(`Fetched ${d.fetched} emails`,'green');
      }else{addLog('red',d.error||'Failed');t(d.error||'Fetch failed','red');}
    }catch{t('Network error','red');}
    setFetching(false);
  };

  const runAgent=async()=>{
    if(!gmailConn)return t('Please connect Gmail first','red');
    setLoading(true);
    addLog('blue',`Agent started — ${mode} mode`);
    t(`Agent running in ${mode==='fast'?'⚡ Fast':'🛡️ Safe'} Mode`,mode==='fast'?'amber':'green');

    // Fetch fresh emails directly from backend — do NOT rely on stale React state
    let freshEmails=[], pendingIds=[];
    try{
      const res=await fetch('/api/gmail-fetch',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail,maxEmails:500,dateRange})});
      const d=await res.json();
      if(d.success){
        addLog('green',`Fetched <strong>${d.fetched}</strong> emails`);
        if(d.emails){setEmails(d.emails);freshEmails=d.emails;}
        if(d.stats)setStats(d.stats);
        if(d.pendingImportant)pendingIds=d.pendingImportant;
      }else{addLog('red',d.error||'Fetch failed');t(d.error||'Fetch failed','red');setLoading(false);return;}
    }catch(e){t('Network error fetching emails','red');setLoading(false);return;}

    if(mode==='safe'){
      // Safe mode: open review modal for first pending email
      const firstPending=freshEmails.find(e=>pendingIds.includes(e.id));
      if(firstPending){setLoading(false);setReplyModal(firstPending);return;}
      t('No pending emails to review','green');
    }else{
      // Fast mode: auto-send replies using fresh pendingIds from server
      if(pendingIds.length===0){t('No new emails need replies','amber');setLoading(false);return;}
      addLog('blue',`Auto-sending replies to <strong>${Math.min(pendingIds.length,10)}</strong> emails…`);
      let sent=0,failed=0;
      for(const emailId of pendingIds.slice(0,10)){
        const em=freshEmails.find(e=>e.id===emailId);
        try{
          const res=await fetch('/api/gmail-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId,mode:'fast',replyTemplate})});
          const d=await res.json();
          if(d.success){sent++;addLog('green',`⚡ Auto-reply sent to <strong>${em?.from||emailId}</strong>`);}
          else{failed++;addLog('amber',`Skipped ${em?.from||emailId}: ${d.message||'already replied'}`);}
        }catch{failed++;addLog('red',`Failed to reply to ${em?.from||emailId}`);}
      }
      t(`Done: ${sent} sent${failed>0?`, ${failed} failed`:''}`,sent>0?'green':'amber');
    }
    setLoading(false);
    await loadStatus();
  };

  const handleSendReply=async(emailId,customReply)=>{
    try{const res=await fetch('/api/gmail-reply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailId,mode:'fast',replyTemplate:customReply})});const d=await res.json();if(d.success){addLog('green','Reply confirmed & sent');t('Reply sent!','green');await loadStatus();}else t(d.error||'Failed','red');}
    catch{t('Network error','red');}
  };

  const doDelete=async(overrideIds)=>{
    const ids=overrideIds||selected;
    const n=ids.length;if(!n)return;
    try{await fetch('/api/gmail-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailIds:ids,action:'trash'})});setEmails(prev=>prev.map(e=>ids.includes(e.id)?{...e,deleted:true}:e));addLog('red',`Moved <strong>${n}</strong> email${n>1?'s':''} to Bin`);t(`${n} moved to Bin`,'red');}
    catch{t('Failed to delete','red');}
    if(!overrideIds){setSelected([]);setDelCat('');}
  };

  const doBulkDeleteAll=async()=>{
    setBulkDeleting(true);
    const catFilter={inbox:e=>!e.archived&&!e.deleted,important:e=>e.tag==='important'&&!e.archived&&!e.deleted,promotions:e=>e.tag==='promo'&&!e.archived&&!e.deleted,spam:e=>e.tag==='spam'&&!e.deleted,bin:e=>e.deleted};
    const ids=emails.filter(e=>Object.keys(bulkDelCats).some(cat=>bulkDelCats[cat]&&catFilter[cat](e))).map(e=>e.id);
    const n=ids.length;
    if(!n){t('No emails found in selected categories','amber');setBulkDeleting(false);setShowBulkDelModal(false);return;}
    try{
      await fetch('/api/gmail-action',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userEmail,emailIds:ids,action:'trash'})});
      setEmails(prev=>prev.map(e=>ids.includes(e.id)?{...e,deleted:true}:e));
      addLog('red',`Bulk deleted <strong>${n}</strong> email${n>1?'s':''} across selected categories`);
      t(`${n} email${n>1?'s':''} deleted`,'red');
    }catch{t('Failed to delete emails','red');}
    setBulkDeleting(false);setShowBulkDelModal(false);setBulkDelCats({inbox:false,important:false,promotions:false,spam:false,bin:false});
  };

  const changeMode=m=>{setMode(m);localStorage.setItem('ms_mode',m);t(m==='fast'?'⚡ Switched to Fast Mode':'🛡️ Switched to Safe Mode',m==='fast'?'amber':'green');};
  const confirmLogout=()=>{sessionStorage.clear();window.location.href='/';};
  const confirmDelete=async()=>{
    setDelErr('');
    if(!delEmail||!delPw){setDelErr('Both fields required.');return;}
    if(delEmail.toLowerCase()!==userEmail.toLowerCase()){setDelErr('Email does not match your account.');return;}
    setDelLoading(true);
    try{const res=await fetch('/api/delete-account',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:delEmail,password:delPw})});const d=await res.json();if(d.success){localStorage.clear();sessionStorage.clear();window.location.href='/';}else setDelErr(d.error||'Failed.');}
    catch{setDelErr('Network error.');}
    setDelLoading(false);
  };
  const connectGmail=()=>{window.location.href=`/api/gmail-auth?email=${encodeURIComponent(userEmail)}`;};
  const disconnectGmail=async()=>{await fetch('/api/gmail-disconnect',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:userEmail})});setGmailConn(false);setEmails([]);setStats({total:0,important:0,promo:0,spam:0,replied:0});t('Gmail disconnected','amber');};
  const toggleSel=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  const selAll=()=>setSelected(filteredEmails(nav).map(e=>e.id));
  const clearSel=()=>setSelected([]);
  const selCat=cat=>{setDelCat(cat);if(!cat){clearSel();return;}setSelected(emails.filter(e=>e.tag===cat).map(e=>e.id));};
  const go=p=>{setNav(p);setSbOpen(false);if(p==='notifications')setNotifs(n=>n.map(x=>({...x,unread:false})));};

  const unread=notifs.filter(n=>n.unread).length;
  const safePending=mode==='safe'?emails.filter(e=>e.tag==='important'&&!e.replied&&!e.deleted).length:0;
  const titles={dashboard:'Dashboard',inbox:'Inbox',important:'Important',promotions:'Promotions',spam:'Spam',bin:'Bin',logs:'Agent Logs',gmail:'Gmail',notifications:'Notifications',settings:'Settings','safe-review':'Review Replies','fast-analyzer':'Reply Analyzer'};

  const NavItem=({id,label,icon,badge,badgeColor,isDot})=>(<button className={`nav-item ${nav===id?'active':''}`} onClick={()=>go(id)} title={label}>{icon}<span className="sb-label">{label}</span>{badge!=null&&!isDot&&<span className={`nav-badge ${badgeColor||''}`}>{badge}</span>}{isDot&&badge>0&&<span className="notif-dot"/>}</button>);

  if(showOB)return <Onboarding onComplete={m=>{setMode(m);setShowOB(false);}}/>;

        <NavItem id="promotions" label="Promotions" icon={I.archive} badge={stats.promo} badgeColor="amber"/>
        <NavItem id="spam" label="Spam" icon={I.trash} badge={stats.spam} badgeColor="red"/>
        <NavItem id="bin" label="Bin" icon={I.bin}/>
        <span className="sb-sec">{mode==='safe'?'🛡️ Safe Mode':'⚡ Fast Mode'}</span>

        }

            <span className="sb-label">Fast</span>
          </button>
          <button className={`mbtn safe ${mode==='safe'?'active':''}`} onClick={()=>changeMode('safe')} title="Safe Mode">

    <main className="main">
      <div className="topbar">

          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

        {/* ══ DASHBOARD ══ */}
        {nav==='dashboard'&&<>
          {!gmailConn&&<div style={{background:'rgba(79,110,247,.06)',border:'1px solid rgba(79,110,247,.2)',borderRadius:9,padding:'12px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:11}}>
            <span style={{fontSize:'1.2rem'}}>📧</span>
            <div style={{flex:1}}><div style={{fontSize:'.8rem',fontWeight:600,color:'var(--text)'}}>Connect your Gmail to get started</div><div style={{fontSize:'.73rem',color:'var(--text-muted)',marginTop:2}}>Emails will be fetched, classified and managed automatically.</div></div>
            <button className="action-btn primary" onClick={()=>go('gmail')}>Connect Gmail →</button>
          </div>}
          <div className={`mode-banner ${mode}`}>
            <div style={{fontSize:'1.3rem'}}>{mode==='fast'?'⚡':'🛡️'}</div>
